# Nginx for the tenant + platform SPA. Serves the built frontend and reverse-
# proxies the API on the SAME origin (/api) — so the browser never makes a
# cross-origin call and we need no CORS config or HTTPS just to talk to the API.
# Uploaded files are served directly from the shared VPS volume at /uploads.

server {
    listen 80 default_server;
    server_name _;

    # Allow large evidence/attachment uploads (data-URLs) through the proxy.
    client_max_body_size 12m;

    root /usr/share/nginx/html;
    index index.html;

    # --- API → NestJS backend (same origin) ---
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # --- Uploaded files stored on the VPS volume ---
    location /uploads/ {
        alias /uploads/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # --- SPA: everything else falls back to index.html (client-side routing,
    #     incl. /platform-admin/*) ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
